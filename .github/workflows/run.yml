name: deal-bot

on:
  schedule:
    - cron: "*/5 * * * *"   # 5 dakikada bir çalışır
  workflow_dispatch:        # elle çalıştırma butonu

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Repo indir
        uses: actions/checkout@v3

      - name: Python kur
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Paketleri yükle
        run: pip install requests beautifulsoup4

      - name: Botu çalıştır
        run: python main.py
